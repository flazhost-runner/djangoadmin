<header class="sticky top-0 z-20 bg-white border-b border-gray-200 h-16 flex items-center justify-between px-6 shadow-sm">
    <div class="flex items-center gap-3">
        <button id="tw-sidebar-toggle" class="md:hidden p-2 rounded-lg hover:bg-gray-100 text-gray-500">
            <i class="fas fa-bars"></i>
        </button>
        <span class="text-sm text-gray-500">Welcome, <strong>{{ request.user.name|default:request.user.email }}</strong></span>
    </div>
    <div class="flex items-center gap-4">
        <a href="{% url 'admin.v1.profile.index' %}" class="text-sm text-gray-600 hover:text-gray-900 flex items-center gap-2">
            <i class="fas fa-user-circle text-lg"></i>
        </a>
        <form method="post" action="{% url 'web.auth.logout' %}">
            {% csrf_token %}
            <button type="submit" class="text-sm text-gray-600 hover:text-red-600 flex items-center gap-1">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </form>
    </div>
</header>

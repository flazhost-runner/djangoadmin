{% load static %}
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{% block title %}{{ setting.name|default:"DjangoAdmin" }}{% endblock %}</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: {
                primary: '{{ theme.primary }}',
                secondary: '{{ theme.secondary }}',
                'theme-light': '{{ theme.light }}',
                'theme-dark': '{{ theme.dark }}'
            }}}
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .form-control { @apply block w-full rounded-lg border border-gray-300 px-3 py-2 text-gray-800 focus:outline-none focus:ring-2 focus:border-transparent; }
            .form-control:focus { --tw-ring-color: var(--primary); }
            .form-control.is-invalid { @apply border-red-500 focus:ring-red-400; }
            select.form-control { @apply bg-white; }
            .form-label { @apply block mb-1 text-sm text-gray-700; }
            .invalid-feedback { @apply block mt-1 text-sm text-red-600; }
            .btn { @apply inline-flex items-center justify-center gap-1 rounded-lg px-4 py-2 text-sm font-medium cursor-pointer transition-colors border-0 no-underline; }
            .btn-sm { @apply px-3 py-1.5 text-xs; }
            .btn-primary-tw { background: var(--primary); @apply text-white; }
            .btn-primary-tw:hover { opacity: 0.9; }
            .btn-success { @apply bg-green-600 text-white hover:bg-green-700; }
            .btn-danger  { @apply bg-red-600 text-white hover:bg-red-700; }
            .btn-info    { @apply bg-sky-400 text-white hover:bg-sky-500; }
            .btn-outline-dark { @apply border border-gray-700 text-gray-700 hover:bg-gray-700 hover:text-white; }
            .btn-primary { background: var(--primary); @apply text-white; }
            .btn-group { @apply relative inline-flex gap-2; }
            .nav-link-tw { @apply flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-200 hover:bg-white/10 transition-colors; }
            .table { @apply w-full text-sm text-gray-700; }
            .table thead tr:first-child { @apply bg-gray-50; }
            .table thead th { @apply py-3 px-4 text-left font-medium text-gray-600 border-b border-gray-200; }
            .table tbody td { @apply py-3 px-4 align-middle border-b border-gray-100; }
            .table tbody tr:hover { @apply bg-gray-50 transition-colors; }
            .table-bordered, .table-hover { }
            .alert { @apply rounded-lg px-4 py-3 mb-4 text-sm border; }
            .alert-danger  { @apply bg-red-50 text-red-700 border-red-200; }
            .alert-success { @apply bg-green-50 text-green-700 border-green-200; }
            .alert-info    { @apply bg-blue-50 text-blue-700 border-blue-200; }
            .alert-warning { @apply bg-yellow-50 text-yellow-800 border-yellow-200; }
            .alert-primary { background: var(--primary); @apply text-white border-transparent; }
            .tw-card { @apply bg-white rounded-xl shadow-sm border border-gray-200; }
            .badge { @apply inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium; }
            .text-bg-primary { background: var(--primary); @apply text-white; }
            .text-bg-secondary { @apply bg-gray-200 text-gray-700; }
            .dropdown-menu { @apply absolute right-0 mt-1 w-44 bg-white border border-gray-200 rounded-xl shadow-lg z-50 hidden; }
            .dropdown-menu.show { @apply block; }
            .dropdown-item { @apply flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 cursor-pointer w-full text-left; }
            .dropdown-item.danger { @apply text-red-600; }
            .dropdown-item.danger:hover { @apply bg-red-50 text-red-600; }
            .dropdown-divider { @apply border-t border-gray-100 my-1; }
            .pagination { @apply flex gap-1 items-center; }
            .page-item .page-link { @apply px-3 py-1.5 rounded-lg text-sm border border-gray-200 hover:bg-gray-100 text-gray-700; }
            .page-item.active .page-link { background: var(--primary); @apply text-white border-transparent; }
            .sidebar-gradient { background: linear-gradient(135deg, var(--primary), var(--theme-dark)); }
            /* Modal */
            .modal-overlay { @apply fixed inset-0 bg-black/50 z-40 flex items-center justify-center hidden; }
            .modal-overlay.active { @apply flex; }
            .modal-box { @apply bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 z-50; }
            .modal-header { @apply flex items-center justify-between px-6 py-4 border-b border-gray-100; }
            .modal-body { @apply px-6 py-4; }
            .modal-footer { @apply flex justify-end gap-2 px-6 py-4 border-t border-gray-100; }
            .modal-close { @apply text-gray-400 hover:text-gray-600 cursor-pointer; }
            /* Toast */
            .toast { @apply fixed bottom-4 right-4 z-50 px-4 py-3 rounded-lg shadow-lg text-sm text-white min-w-[200px] translate-y-2 opacity-0 transition-all duration-300 pointer-events-none; }
            .toast.show { @apply translate-y-0 opacity-100 pointer-events-auto; }
            .toast.success { @apply bg-green-600; }
            .toast.error   { @apply bg-red-600; }
            .toast.info    { @apply bg-blue-500; }
        }
    </style>
    <link rel="stylesheet" href="{% static 'be/default/vendor/fontawesome-free/css/all.min.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- jQuery (dependensi trumbowyg) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <!-- Trumbowyg (rich text editor) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Trumbowyg/2.21.0/trumbowyg.min.js" integrity="sha512-l6MMck8/SpFCgbJnIEfVsWQ8MaNK/n2ppTiELW3I2BFY5pAm/WjkNHSt+2OD7+CZtygs+jr+dAgzNdjNuCU7kw==" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Trumbowyg/2.21.0/ui/trumbowyg.min.css" integrity="sha512-XjpikIIW1P7jUS8ZWIznGs9KHujZQxhbnEsqMVQ5GBTTRmmJe32+ULipOxFePB8F8j9ahKmCjyJJ22VNEX60yg==" crossorigin="anonymous">
    <!-- Trumbowyg file manager plugin (local) -->
    <script src="{% static 'be/default/vendor/trumbowyg/filemanager.js' %}"></script>
    {% block extra_head %}{% endblock %}
</head>
